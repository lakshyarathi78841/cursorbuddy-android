workflows:
  android-debug:
    name: Android Debug Build
    max_build_duration: 30
    environment:
      java: 17
    scripts:
      - name: Build debug APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/app-debug.apk
